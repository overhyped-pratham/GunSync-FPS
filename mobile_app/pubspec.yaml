name: gunsync_controller
description: GunSync FPS - Smartphone Gun Controller
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Sensors
  sensors_plus: ^6.1.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # Virtual joystick
  flutter_joystick: ^0.0.4

  # Haptic / Vibration
  vibration: ^2.0.0

  # QR Code display & scan
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Permissions
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # Utils
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
