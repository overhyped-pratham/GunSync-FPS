<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GunSync FPS WebGL Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* 2D HUD Layout */
        #hud-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
        }
        
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-panel {
            background: rgba(5, 10, 20, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 12px 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .hud-title {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #888da7;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .hud-value {
            font-size: 28px;
            font-weight: 900;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .status-badge {
            display: flex;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-radius: 4px;
            padding: 6px 14px;
            border: 1px solid #ff4040;
            background: rgba(255, 64, 64, 0.1);
        }

        .status-badge.connected {
            border: 1px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4040;
            margin-right: 8px;
        }

        .status-badge.connected .status-dot {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        /* Bottom section */
        .hud-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .ammo-panel {
            min-width: 140px;
            border-color: rgba(255, 170, 0, 0.2);
        }

        .ammo-panel.low {
            border-color: rgba(255, 64, 64, 0.4);
            animation: pulse-border 1s infinite alternate;
        }

        @keyframes pulse-border {
            from { border-color: rgba(255, 64, 64, 0.2); }
            to { border-color: rgba(255, 64, 64, 0.6); }
        }

        .weapon-name {
            font-size: 18px;
            font-weight: 900;
            color: #ffaa00;
            letter-spacing: 1px;
        }

        .reloading-indicator {
            color: #ffaa00;
            font-size: 14px;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 3D Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            z-index: 10;
            pointer-events: none;
        }
        .crosshair-line {
            background: #00ff88;
            position: absolute;
            box-shadow: 0 0 6px #00ff88;
        }
        .crosshair-h {
            width: 8px;
            height: 2px;
            top: 14px;
        }
        .crosshair-v {
            width: 2px;
            height: 8px;
            left: 14px;
        }
        .ch-left { left: 0; }
        .ch-right { right: 0; }
        .ch-top { top: 0; }
        .ch-bottom { bottom: 0; }
        .crosshair-dot {
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            position: absolute;
            top: 13px;
            left: 13px;
            box-shadow: 0 0 6px #00ff88;
        }

        /* Score Feed / Kill notifications */
        #kill-feed {
            position: absolute;
            right: 30px;
            top: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 10;
        }

        .kill-msg {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid #00ff88;
            border-radius: 4px;
            color: #00ff88;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            padding: 8px 16px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
            animation: slide-in 0.2s ease-out;
        }

        @keyframes slide-in {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Screen hit flash overlay */
        #screen-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 64, 64, 0.15);
            pointer-events: none;
            opacity: 0;
            z-index: 2;
            transition: opacity 0.05s ease-out;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="screen-flash"></div>
    <div id="crosshair">
        <div class="crosshair-line crosshair-h ch-left"></div>
        <div class="crosshair-line crosshair-h ch-right"></div>
        <div class="crosshair-line crosshair-v ch-top"></div>
        <div class="crosshair-line crosshair-v ch-bottom"></div>
        <div class="crosshair-dot"></div>
    </div>

    <!-- HUD -->
    <div id="hud-container">
        <div class="hud-header">
            <div class="hud-panel">
                <div class="hud-title">Score</div>
                <div class="hud-value" id="val-score">0</div>
            </div>
            
            <div class="status-badge" id="val-connection">
                <div class="status-dot"></div>
                <span id="txt-connection">WAITING FOR CONTROLLER...</span>
            </div>
        </div>

        <div id="kill-feed"></div>

        <div class="hud-footer">
            <div class="hud-panel">
                <div class="hud-title">FPS</div>
                <div class="hud-value" style="font-size: 14px;" id="val-fps">60</div>
            </div>

            <div class="hud-panel ammo-panel" id="panel-ammo">
                <div class="hud-title">Weapon & Ammo</div>
                <div class="weapon-name" id="val-weapon">PISTOL</div>
                <div class="hud-value" id="val-ammo">12/12</div>
                <div class="reloading-indicator" style="display: none;" id="lbl-reloading">RELOADING...</div>
            </div>
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // WebSocket setup
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/game`;
        let socket = null;

        // UI references
        const scoreTxt = document.getElementById('val-score');
        const connectionBadge = document.getElementById('val-connection');
        const connectionTxt = document.getElementById('txt-connection');
        const ammoTxt = document.getElementById('val-ammo');
        const weaponTxt = document.getElementById('val-weapon');
        const reloadingTxt = document.getElementById('lbl-reloading');
        const ammoPanel = document.getElementById('panel-ammo');
        const killFeed = document.getElementById('kill-feed');
        const screenFlash = document.getElementById('screen-flash');
        const fpsTxt = document.getElementById('val-fps');

        // Game Configuration
        let score = 0;
        let ammoCurrent = 12;
        let ammoMax = 12;
        let isReloading = false;
        let currentWeapon = 'pistol';

        const weaponConfig = {
            pistol: { displayName: 'Pistol', maxAmmo: 12, damage: 35, fireRate: 2.5, reloadTime: 1200, color: '#ffaa00', soundType: 'pistol' },
            smg: { displayName: 'SMG', maxAmmo: 30, damage: 20, fireRate: 8, reloadTime: 1800, color: '#00aaff', soundType: 'smg' },
            shotgun: { displayName: 'Shotgun', maxAmmo: 6, damage: 18, fireRate: 1.2, reloadTime: 2200, color: '#ff4040', soundType: 'shotgun', pellets: 8 },
            sniper: { displayName: 'Sniper', maxAmmo: 5, damage: 150, fireRate: 0.6, reloadTime: 2800, color: '#00ff88', soundType: 'sniper' }
        };

        const weapons = ['pistol', 'smg', 'shotgun', 'sniper'];
        let weaponIndex = 0;
        let nextFireTime = 0;

        // 3D Scene Setup variables
        let scene, camera, renderer;
        let targets = [];
        let particles = [];
        let playerVelocity = new THREE.Vector3();
        let joystickInput = new THREE.Vector2();
        let targetRotation = new THREE.Euler(0, 0, 0, 'YXZ');
        let currentRotation = new THREE.Euler(0, 0, 0, 'YXZ');
        let gunGroup, muzzleFlashSprite;
        let laserLines = [];

        // Audio System
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        // Web Audio Synthesized Sounds
        function playLaserSound(type) {
            const ctx = getAudioContext();
            if (ctx.state === 'suspended') ctx.resume();

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.connect(gain);
            gain.connect(ctx.destination);

            const now = ctx.currentTime;
            
            if (type === 'pistol') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'smg') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'shotgun') {
                // Noise buffer + low pitch swoop
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
                
                // Add noise kick
                playNoiseSound(0.25, 0.4);
            } else if (type === 'sniper') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.40);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.40);
                osc.start(now);
                osc.stop(now + 0.40);
                
                playNoiseSound(0.40, 0.6);
            }
        }

        function playNoiseSound(duration, volume) {
            const ctx = getAudioContext();
            const bufferSize = ctx.sampleRate * duration;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 600;
            
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            
            noise.start();
            noise.stop(ctx.currentTime + duration);
        }

        function playReloadSound() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.setValueAtTime(450, now + 0.15);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
            
            osc.start(now);
            osc.stop(now + 0.3);
        }

        function playEmptySound() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
            
            osc.start(now);
            osc.stop(now + 0.05);
        }

        function playExplosionSound() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
            
            osc.start(now);
            osc.stop(now + 0.5);
            
            playNoiseSound(0.5, 0.3);
        }

        // ── WebSocket Connect
        function connectSocket() {
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                connectionBadge.classList.add('connected');
                connectionTxt.innerText = 'CONTROLLER ONLINE';
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'input') {
                        handleControllerInput(data);
                    } else if (data.type === 'status') {
                        if (!data.phoneConnected) {
                            connectionBadge.classList.remove('connected');
                            connectionTxt.innerText = 'WAITING FOR CONTROLLER...';
                        }
                    }
                } catch (e) {
                    console.log('WS parsing error:', e);
                }
            };

            socket.onclose = () => {
                connectionBadge.classList.remove('connected');
                connectionTxt.innerText = 'WS OFFLINE — RECONNECTING...';
                setTimeout(connectSocket, 2000);
            };
        }

        // ── Handle Input Stream from Phone
        let lastFireState = false;
        function handleControllerInput(data) {
            // Gyro Aiming Angles (Beta represents pitch, Alpha represents yaw)
            targetRotation.x = THREE.MathUtils.degToRad(data.pitch);
            targetRotation.y = THREE.MathUtils.degToRad(data.yaw);

            // Joystick Movement
            joystickInput.x = data.joystickX;
            joystickInput.y = data.joystickY;

            // Trigger firing based on weapon type (semi-auto vs auto)
            const config = weaponConfig[currentWeapon];
            if (data.fire) {
                if (config.isAutomatic) {
                    shoot();
                } else if (!lastFireState) {
                    shoot();
                }
            }
            lastFireState = data.fire;

            // Shake reload gesture
            if (data.reload && !isReloading) {
                reload();
            }

            // Swipe to switch weapons
            if (data.weaponSwipe !== 0) {
                switchWeapon(data.weaponSwipe);
            }
        }

        // ── Shoot weapon logic
        function shoot() {
            if (isReloading) return;
            
            if (ammoCurrent <= 0) {
                playEmptySound();
                return;
            }

            const now = performance.now();
            const config = weaponConfig[currentWeapon];
            if (now < nextFireTime) return;

            nextFireTime = now + (1000 / config.fireRate);
            ammoCurrent--;
            updateHUD();

            // Sound
            playLaserSound(config.soundType);

            // Outgoing Recoil command back to phone
            sendRecoilEvent(config);

            // Recoil Animation on Gun Model
            gunGroup.position.z = 0.2; // Move gun back

            // Muzzle flash
            muzzleFlashSprite.scale.setScalar(0.4 + Math.random() * 0.2);
            setTimeout(() => muzzleFlashSprite.scale.setScalar(0), 50);

            // Raycast projectile
            const raycaster = new THREE.Raycaster();
            
            // Multiple pellets (for Shotgun spread)
            const totalPellets = config.pellets || 1;
            for (let p = 0; p < totalPellets; p++) {
                const spreadAngle = (config.spread || 0) * (Math.PI / 180);
                const offset = new THREE.Vector2(
                    (Math.random() - 0.5) * spreadAngle,
                    (Math.random() - 0.5) * spreadAngle
                );

                // Setup laser line endpoints
                const origin = new THREE.Vector3().copy(camera.position);
                // Offset origin to align with gun tip
                origin.add(new THREE.Vector3(0.12, -0.15, -0.4).applyQuaternion(camera.quaternion));

                // Raycast in camera direction plus spread offset
                const targetDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                if (offset.length() > 0) {
                    targetDir.add(new THREE.Vector3(offset.x, offset.y, 0).applyQuaternion(camera.quaternion)).normalize();
                }

                raycaster.set(camera.position, targetDir);
                const intersects = raycaster.intersectObjects(targets);

                let hitPoint = new THREE.Vector3().copy(camera.position).addScaledVector(targetDir, 50);

                if (intersects.length > 0) {
                    const hitObj = intersects[0];
                    hitPoint.copy(hitObj.point);

                    // Register hit on Target Drone
                    const targetDrone = hitObj.object;
                    const killed = targetDrone.takeDamage(config.damage, hitPoint);
                    
                    if (killed) {
                        score += 100;
                        sendHitEvent(targetDrone.name, true);
                        showKillFeed(targetDrone.name);
                        playExplosionSound();
                    } else {
                        sendHitEvent(targetDrone.name, false);
                    }
                }

                // Render Laser beam
                createLaserBeam(origin, hitPoint, config.color);
            }

            if (ammoCurrent <= 0) {
                reload();
            }
        }

        // ── Weapon Reload
        function reload() {
            if (isReloading || ammoCurrent === ammoMax) return;
            isReloading = true;
            updateHUD();
            playReloadSound();

            sendAmmoStateToPhone();

            setTimeout(() => {
                ammoCurrent = ammoMax;
                isReloading = false;
                updateHUD();
                sendAmmoStateToPhone();
            }, weaponConfig[currentWeapon].reloadTime);
        }

        // ── Switch weapons
        function switchWeapon(direction) {
            if (isReloading) return;
            
            weaponIndex = (weaponIndex + direction + weapons.length) % weapons.length;
            currentWeapon = weapons[weaponIndex];
            
            const config = weaponConfig[currentWeapon];
            ammoMax = config.maxAmmo;
            ammoCurrent = config.maxAmmo;
            
            // Adjust 3D weapon model color to reflect weapon type
            const gunMaterial = gunGroup.children[0].material;
            gunMaterial.color.set(config.color);
            gunMaterial.emissive.set(config.color).multiplyScalar(0.2);

            updateHUD();
            sendAmmoStateToPhone();
        }

        // ── UI updates
        function updateHUD() {
            scoreTxt.innerText = score;
            weaponTxt.innerText = currentWeapon.toUpperCase();
            weaponTxt.style.color = weaponConfig[currentWeapon].color;
            
            if (isReloading) {
                ammoTxt.style.display = 'none';
                reloadingTxt.style.display = 'block';
                ammoPanel.classList.add('low');
            } else {
                ammoTxt.style.display = 'block';
                reloadingTxt.style.display = 'none';
                ammoTxt.innerText = `${ammoCurrent}/${ammoMax}`;
                if (ammoCurrent < 4) {
                    ammoPanel.classList.add('low');
                } else {
                    ammoPanel.classList.remove('low');
                }
            }
        }

        function showKillFeed(enemyName) {
            const msg = document.createElement('div');
            msg.className = 'kill-msg';
            msg.innerText = `☠ ${enemyName.toUpperCase()} DOWN  +100`;
            killFeed.appendChild(msg);

            // Trigger hit flash
            screenFlash.style.opacity = 1;
            setTimeout(() => screenFlash.style.opacity = 0, 50);

            setTimeout(() => {
                msg.style.opacity = 0;
                setTimeout(() => msg.remove(), 200);
            }, 2500);
        }

        // ── Outgoing events to Server (Relayed to Phone)
        function sendRecoilEvent(config) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'recoil',
                    gun: currentWeapon,
                    pattern: config.recoilPattern,
                    duration: config.recoilDuration,
                    intensity: config.recoilIntensity
                }));
            }
        }

        function sendHitEvent(enemyId, isKill) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'hit',
                    enemyId: enemyId,
                    isKill: isKill,
                    score: score
                }));
            }
        }

        function sendAmmoStateToPhone() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'ammo',
                    weapon: currentWeapon,
                    ammoCurrent: ammoCurrent,
                    ammoMax: ammoMax,
                    isReloading: isReloading
                }));
            }
        }

        // ─────────────────────────────────────────────
        // 3D Scene Initialization (WebGL)
        // ─────────────────────────────────────────────
        function init3D() {
            const container = document.getElementById('canvas-container');

            // 1. Create Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050a, 0.015);

            // 2. Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 0);

            // 3. Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // 4. Lights
            const ambient = new THREE.AmbientLight(0x0a0f24);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0x00ff88, 0.4);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // 5. Build Arena floor/walls (Procedural grid)
            buildArena();

            // 6. Create Gun model
            buildGun();

            // 7. Spawn Target Drones
            for (let i = 1; i <= 6; i++) {
                spawnTarget(`Drone_${i}`);
            }

            // Window resize handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ── Procedural Neon Arena
        function buildArena() {
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x050811,
                roughness: 0.8,
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Grid helper for the neon floor grid lines
            const gridHelper = new THREE.GridHelper(100, 50, 0x00ff88, 0x112233);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            // Neon glowing columns/pillars in the scene
            const pillarGeo = new THREE.BoxGeometry(2, 10, 2);
            const pillarMat = new THREE.MeshStandardMaterial({
                color: 0x0a0f1d,
                roughness: 0.5,
                metalness: 0.8
            });

            const pillarPositions = [
                [-15, -15], [15, -15], [-15, 15], [15, 15],
                [-30, 0], [30, 0], [0, -30], [0, 30]
            ];

            pillarPositions.forEach(([x, z]) => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(x, 5, z);
                scene.add(pillar);

                // Add glowing outline edge for neon feel
                const outlineGeo = new THREE.BoxGeometry(2.05, 10.05, 2.05);
                const outlineMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true, transparent: true, opacity: 0.15 });
                const outline = new THREE.Mesh(outlineGeo, outlineMat);
                outline.position.set(x, 5, z);
                scene.add(outline);
            });
        }

        // ── Build 3D Gun Model attached to camera
        function buildGun() {
            gunGroup = new THREE.Group();
            
            // Simple Sci-fi Blaster shape
            const barrelGeo = new THREE.BoxGeometry(0.06, 0.06, 0.4);
            const gunMat = new THREE.MeshStandardMaterial({
                color: 0xffaa00,
                roughness: 0.2,
                metalness: 0.9,
                emissive: 0xffaa00,
                emissiveIntensity: 0.1
            });
            const barrel = new THREE.Mesh(barrelGeo, gunMat);
            barrel.position.set(0, 0, -0.2);
            gunGroup.add(barrel);

            const handleGeo = new THREE.BoxGeometry(0.05, 0.12, 0.06);
            const handle = new THREE.Mesh(handleGeo, gunMat);
            handle.position.set(0, -0.08, -0.05);
            handle.rotation.x = -Math.PI / 6;
            gunGroup.add(handle);

            // Muzzle flash particle sprite
            const flashCanvas = document.createElement('canvas');
            flashCanvas.width = 64;
            flashCanvas.height = 64;
            const fCtx = flashCanvas.getContext('2d');
            const grad = fCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.3, 'rgba(255, 200, 0, 0.8)');
            grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
            fCtx.fillStyle = grad;
            fCtx.fillRect(0, 0, 64, 64);

            const flashTexture = new THREE.CanvasTexture(flashCanvas);
            const flashMat = new THREE.SpriteMaterial({ map: flashTexture, transparent: true, blending: THREE.AdditiveBlending });
            muzzleFlashSprite = new THREE.Sprite(flashMat);
            muzzleFlashSprite.position.set(0, 0, -0.42);
            muzzleFlashSprite.scale.setScalar(0); // initially hidden
            gunGroup.add(muzzleFlashSprite);

            // Offset gun position from camera center
            gunGroup.position.set(0.12, -0.15, -0.4);
            camera.add(gunGroup);
            scene.add(camera);
        }

        // ── Spawn Target Drone
        function spawnTarget(name) {
            const drone = new THREE.Group();
            drone.name = name;
            drone.health = 100;

            // Core sphere
            const sphereGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const coreMat = new THREE.MeshStandardMaterial({
                color: 0xff4040,
                roughness: 0.3,
                emissive: 0xff4040,
                emissiveIntensity: 0.4
            });
            const core = new THREE.Mesh(sphereGeo, coreMat);
            drone.add(core);

            // Neon glowing target ring
            const ringGeo = new THREE.TorusGeometry(0.9, 0.05, 8, 24);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff4040, wireframe: true });
            const targetRing = new THREE.Mesh(ringGeo, ringMat);
            targetRing.rotation.x = Math.PI / 2;
            drone.add(targetRing);

            // Position drone randomly in front of player
            resetTargetPosition(drone);

            // Take Damage logic
            drone.takeDamage = function(damage, hitPoint) {
                drone.health -= damage;
                
                // Spawn hit particles
                spawnImpactParticles(hitPoint, 0xff4040);

                if (drone.health <= 0) {
                    // Explode
                    spawnImpactParticles(drone.position, 0x00ff88, 30);
                    resetTargetPosition(drone);
                    drone.health = 100;
                    return true; // killed
                }
                
                // Visual feedback (flash core white briefly)
                core.material.color.set(0xffffff);
                core.material.emissive.set(0xffffff);
                setTimeout(() => {
                    core.material.color.set(0xff4040);
                    core.material.emissive.set(0xff4040);
                }, 100);
                return false; // hit but alive
            };

            scene.add(drone);
            targets.push(drone);
        }

        function resetTargetPosition(drone) {
            const distance = 15 + Math.random() * 20;
            const angle = Math.random() * Math.PI * 2;
            drone.position.set(
                Math.cos(angle) * distance,
                1.2 + Math.random() * 5,
                Math.sin(angle) * distance
            );
        }

        // ── Laser projectile render beam
        function createLaserBeam(origin, end, colorHex) {
            const points = [origin, end];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({
                color: colorHex,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
            
            laserLines.push({
                mesh: line,
                life: 1.0 // fade out life
            });
        }

        // ── Particle Explosion Effects
        function spawnImpactParticles(position, color, count = 12) {
            const pGeo = new THREE.SphereGeometry(0.05, 4, 4);
            const pMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9 });

            for (let i = 0; i < count; i++) {
                const particle = new THREE.Mesh(pGeo, pMat);
                particle.position.copy(position);
                
                // Random velocities
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5 + 2,
                    (Math.random() - 0.5) * 5
                );
                particle.life = 1.0;
                scene.add(particle);
                particles.push(particle);
            }
        }

        // ── Game Loop (Rendering & Physics Updates)
        let lastTime = performance.now();
        let frameCount = 0;
        let fpsTimer = 0;

        // Advanced movement/gyro variables
        let currentTilt = 0;
        let bobTimer = 0;
        const currentVelocity = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Frame rate tracking
            frameCount++;
            fpsTimer += dt;
            if (fpsTimer >= 1.0) {
                fpsTxt.innerText = frameCount;
                frameCount = 0;
                fpsTimer = 0;
            }

            // 1. Interpolate / Smooth Camera Angles from Gyroscope Yaw/Pitch
            // Slerping/Lerping provides low-latency feels and handles signal spikes
            const lastPitch = currentRotation.x;
            const lastYaw = currentRotation.y;

            currentRotation.x = THREE.MathUtils.lerp(currentRotation.x, targetRotation.x, dt * 25);
            currentRotation.y = THREE.MathUtils.lerp(currentRotation.y, targetRotation.y, dt * 25);
            camera.quaternion.setFromEuler(currentRotation);

            // 2. Weapon Sway (Gun lags behind camera rotation slightly for inertia feedback)
            const pitchSpeed = (currentRotation.x - lastPitch) / Math.max(0.001, dt);
            const yawSpeed = (currentRotation.y - lastYaw) / Math.max(0.001, dt);

            // Smooth out sway values
            const targetSwayX = THREE.MathUtils.clamp(-yawSpeed * 0.015, -0.05, 0.05);
            const targetSwayY = THREE.MathUtils.clamp(pitchSpeed * 0.015, -0.05, 0.05);

            gunGroup.position.x = THREE.MathUtils.lerp(gunGroup.position.x, 0.12 + targetSwayX, dt * 10);
            gunGroup.position.y = THREE.MathUtils.lerp(gunGroup.position.y, -0.15 + targetSwayY, dt * 10);
            gunGroup.rotation.y = THREE.MathUtils.lerp(gunGroup.rotation.y, targetSwayX * 0.5, dt * 10);
            gunGroup.rotation.x = THREE.MathUtils.lerp(gunGroup.rotation.x, -targetSwayY * 0.5, dt * 10);

            // 3. Player movement based on Mobile Joystick (with inertia & acceleration)
            const moveDir = new THREE.Vector3(joystickInput.x, 0, -joystickInput.y);
            const isMoving = moveDir.lengthSq() > 0.01;

            // Move relative to camera yaw rotation
            const cameraYaw = new THREE.Euler(0, currentRotation.y, 0, 'YXZ');
            moveDir.applyEuler(cameraYaw).normalize();
            
            const maxSpeed = 7.0; // max speed in units/sec
            const targetVelocity = new THREE.Vector3().copy(moveDir).multiplyScalar(maxSpeed);

            // Interpolate current velocity towards target velocity (inertia/friction)
            const lerpFactor = isMoving ? 8.0 : 12.0; // faster deceleration than acceleration
            currentVelocity.lerp(targetVelocity, dt * lerpFactor);
            camera.position.addScaledVector(currentVelocity, dt);

            // Keep player bounded in the arena
            camera.position.x = Math.max(-45, Math.min(45, camera.position.x));
            camera.position.z = Math.max(-45, Math.min(45, camera.position.z));

            // 4. Head Bobbing & Strafing Camera Tilt
            let bobHeight = 0;
            let targetTilt = 0;

            if (isMoving) {
                // Head bob frequency depends on speed
                const speedRatio = currentVelocity.length() / maxSpeed;
                bobTimer += dt * 12 * speedRatio;
                bobHeight = Math.sin(bobTimer) * 0.04 * speedRatio;

                // Strafe tilt: tilt camera left when moving right, right when moving left
                targetTilt = -joystickInput.x * 0.035; 
            } else {
                bobTimer = 0;
                targetTilt = 0;
            }

            // Apply camera height bobbing
            camera.position.y = 1.8 + bobHeight;

            // Apply camera roll tilt smoothly
            currentTilt = THREE.MathUtils.lerp(currentTilt, targetTilt, dt * 8);
            camera.rotation.z = currentTilt;

            // 5. Animate Gun recoil model recovery (Z-axis kickback)
            gunGroup.position.z = THREE.MathUtils.lerp(gunGroup.position.z, -0.4, dt * 15);

            // 6. Animate floating/hovering Target Drones
            targets.forEach((drone, index) => {
                drone.position.y += Math.sin(now * 0.002 + index) * 0.005;
                drone.rotation.y += 0.01;
            });

            // 7. Update laser lines (fade and destroy)
            for (let i = laserLines.length - 1; i >= 0; i--) {
                const line = laserLines[i];
                line.life -= dt * 10;
                line.mesh.material.opacity = line.life;
                if (line.life <= 0) {
                    scene.remove(line.mesh);
                    line.mesh.geometry.dispose();
                    line.mesh.material.dispose();
                    laserLines.splice(i, 1);
                }
            }

            // 8. Update exploding particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.addScaledVector(p.velocity, dt);
                p.velocity.y -= 9.8 * dt; // Gravity
                p.life -= dt * 1.5;
                p.material.opacity = p.life;

                if (p.life <= 0) {
                    scene.remove(p);
                    p.geometry.dispose();
                    p.material.dispose();
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Start WebGL and Sockets
        init3D();
        connectSocket();
        animate();

        // Audio Activation overlay trigger
        document.body.addEventListener('click', () => {
            getAudioContext();
        });
    </script>
</body>
</html>
